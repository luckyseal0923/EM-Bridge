<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EMS 資訊橋接平台｜Demo</title>

<style>
:root{
  --primary:#b91c1c;
  --soft:#fee2e2;
  --bg:#fff1f2;
  --border:#fecaca;
  --text:#7f1d1d;
  --muted:#9f1239;
}

body{
  margin:0;
  padding:20px;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;
  color:var(--text);
}

.container{ max-width:1200px; margin:auto; }

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

h1{ margin:0; font-size:22px; }

button{
  border:none;
  border-radius:10px;
  padding:8px 14px;
  background:var(--primary);
  color:white;
  cursor:pointer;
}

.card{
  background:white;
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
}

.search{
  margin-bottom:12px;
}
.search input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
}

/* ===== Task ===== */
.task{
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:12px;
  overflow:hidden;
}

.task-header{
  padding:12px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
  background:#fffafa;
}

.task-header:hover{ background:#fff1f2; }

.task-id{ font-weight:700; }
.meta{ font-size:12px; margin-top:4px; }

.badge{
  font-size:12px;
  padding:4px 10px;
  border-radius:999px;
}
.pending{ background:#fff7ed; }
.done{ background:#fee2e2; }

.task-body{
  display:none;
  padding:12px;
  border-top:1px solid var(--border);
  background:#fffafa;
}

.kv{
  display:grid;
  grid-template-columns:120px 1fr;
  gap:6px 10px;
  font-size:14px;
}

hr{ border:none; border-top:1px solid var(--border); margin:10px 0; }
</style>
</head>

<body>
<div class="container">

<div class="header">
  <h1>🚑 EMS 資訊橋接平台｜Demo</h1>
  <button onclick="toggleLogin()" id="loginBtn">🔓 未登入</button>
</div>

<div class="card">
  <div class="search">
    <input id="search" placeholder="搜尋 任務編號 / 姓名 / 主訴" oninput="render()" />
  </div>
  <div id="list"></div>
</div>

</div>

<script>
let loggedIn = false;

const tasks = [
  {
    id:"EMS-20260210-0001",
    p:{name:"楊*盛",sex:"男性",age:80,addr:"新北市平溪區十分街214號",time:"2026/02/10 14:17",cc:"喘"},
    r:{}
  },
  {
    id:"EMS-20260210-0002",
    p:{name:"林*德",sex:"男性",age:65,addr:"新北市板橋區文化路",time:"2026/02/10 15:02",cc:"胸痛"},
    r:{t:"給氧",m:"抽血",d:"急診留觀"}
  }
];

function maskName(n){
  if(loggedIn) return n;
  return n[0] + "○" + n[n.length-1];
}
function maskAddr(a){
  if(loggedIn) return a;
  return a.slice(0,6) + "＊＊＊";
}

function toggleLogin(){
  loggedIn = !loggedIn;
  document.getElementById("loginBtn").innerText = loggedIn ? "🔐 醫院端登入" : "🔓 未登入";
  render();
}

function render(){
  const q = document.getElementById("search").value;
  list.innerHTML = "";

  tasks.filter(t=>{
    const s = `${t.id}${t.p.name}${t.p.cc}`;
    return s.includes(q);
  }).forEach((t,i)=>{
    const done=!!t.r.d;
    list.innerHTML+=`
    <div class="task">
      <div class="task-header" onclick="${loggedIn?`toggle(${i})`:''}">
        <div>
          <div class="task-id">${t.id}</div>
          <div class="meta">
            ${maskName(t.p.name)}｜${t.p.sex} ${t.p.age}歲｜${t.p.cc}<br>
            ${t.p.time}
          </div>
        </div>
        <span class="badge ${done?'done':'pending'}">${done?'已回報':'待回報'}</span>
      </div>
      ${
        loggedIn
        ? `<div class="task-body" id="b${i}">
            <div class="kv">
              <div>姓名</div><div>${t.p.name}</div>
              <div>地址</div><div>${t.p.addr}</div>
              <div>主訴</div><div>${t.p.cc}</div>
              <div>後送醫院</div><div>北市立萬芳醫院</div>
            </div>
            <hr>
            ${done?`處置：${t.r.t}<br>治療：${t.r.m}<br>動向：${t.r.d}`:`<i>尚未回報</i>`}
          </div>`
        : ``
      }
    </div>`;
  });
}

function toggle(i){
  const el=document.getElementById("b"+i);
  el.style.display = el.style.display==="block"?"none":"block";
}

render();
</script>
</body>
</html>
