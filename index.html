<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EMT 起單 → 醫院回報｜任務清單 Demo</title>

<style>
:root{
  --primary:#0f766e;
  --bg:#f1f5f9;
  --card:#ffffff;
  --border:#e2e8f0;
  --muted:#64748b;
  --pending:#f59e0b;
  --done:#16a34a;
}

body{
  margin:0;
  padding:20px;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;
}

.container{
  max-width:1100px;
  margin:auto;
}

h1{
  font-size:20px;
  margin-bottom:12px;
}

.grid{
  display:grid;
  grid-template-columns:360px 1fr;
  gap:16px;
}
@media(max-width:900px){
  .grid{ grid-template-columns:1fr; }
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.04);
}

label{
  font-size:13px;
  display:block;
  margin-top:8px;
}

input, textarea, select{
  width:100%;
  padding:8px;
  border-radius:8px;
  border:1px solid var(--border);
}

button{
  margin-top:10px;
  padding:8px 14px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:white;
  cursor:pointer;
}

/* ===== 任務卡 ===== */
.task{
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:12px;
  overflow:hidden;
}

.task-header{
  padding:12px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
}
.task-header:hover{ background:#f8fafc; }

.task-id{ font-weight:700; }
.task-meta{ font-size:12px; color:var(--muted); }

.badge{
  font-size:12px;
  padding:3px 8px;
  border-radius:999px;
}
.pending{ background:#fff7ed; color:#9a3412; }
.done{ background:#ecfdf5; color:#166534; }

.task-body{
  display:none;
  padding:12px;
  background:#f8fafc;
  border-top:1px solid var(--border);
}

.kv{
  display:grid;
  grid-template-columns:120px 1fr;
  gap:6px 10px;
  font-size:14px;
}

hr{
  border:none;
  border-top:1px solid var(--border);
  margin:10px 0;
}
</style>
</head>

<body>
<div class="container">
<h1>🚑 EMT 起單 → 醫院端任務清單（待回報可直接填）</h1>

<div class="grid">

<!-- EMT 起單 -->
<div class="card">
<h3>EMT 起單</h3>
<label>姓名</label><input id="name">
<label>性別</label><select id="sex"><option>男性</option><option>女性</option></select>
<label>年齡</label><input id="age">
<label>地址</label><input id="addr">
<label>報案時間</label><input id="time">
<label>主訴</label><input id="cc">
<label>後送醫院</label><input id="hospital">
<button onclick="createTask()">建立任務</button>
</div>

<!-- 醫院端 -->
<div class="card">
<h3>醫院端任務清單</h3>
<div id="list"></div>
</div>

</div>
</div>

<script>
let tasks = [
  {
    id:"EMS-20260210-0001",
    p:{name:"楊*盛",sex:"男性",age:80,cc:"喘",hospital:"萬芳醫院"},
    r:{}
  },
  {
    id:"EMS-20260210-0002",
    p:{name:"林*德",sex:"男性",age:65,cc:"胸痛",hospital:"萬芳醫院"},
    r:{}
  },
  {
    id:"EMS-20260210-0003",
    p:{name:"陳*芬",sex:"女性",age:72,cc:"意識改變",hospital:"萬芳醫院"},
    r:{t:"插管",m:"CT",d:"ICU"}
  }
];

function render(){
  const list=document.getElementById("list");
  list.innerHTML="";
  tasks.forEach((t,i)=>{
    const done=!!t.r.d;
    list.innerHTML+=`
    <div class="task">
      <div class="task-header" onclick="toggle(${i})">
        <div>
          <div class="task-id">${t.id}</div>
          <div class="task-meta">${t.p.name}｜${t.p.cc}</div>
        </div>
        <span class="badge ${done?"done":"pending"}">${done?"已回報":"待回報"}</span>
      </div>
      <div class="task-body" id="body${i}">
        <div class="kv">
          <div>姓名</div><div>${t.p.name}</div>
          <div>主訴</div><div>${t.p.cc}</div>
          <div>後送</div><div>${t.p.hospital}</div>
        </div>
        <hr>
        ${
          done
          ? `
            處置：${t.r.t}<br>
            治療：${t.r.m}<br>
            動向：${t.r.d}
          `
          : `
            <label>處置</label><textarea id="t${i}"></textarea>
            <label>治療</label><textarea id="m${i}"></textarea>
            <label>動向</label>
            <select id="d${i}">
              <option></option>
              <option>急診留觀</option>
              <option>一般病房</option>
              <option>ICU</option>
              <option>出院</option>
            </select>
            <button onclick="save(${i})">送出回報</button>
          `
        }
      </div>
    </div>`;
  });
}

function toggle(i){
  document.querySelectorAll(".task-body").forEach((b,idx)=>{
    b.style.display = idx===i && b.style.display!=="block" ? "block":"none";
  });
}

function save(i){
  tasks[i].r={
    t:document.getElementById("t"+i).value,
    m:document.getElementById("m"+i).value,
    d:document.getElementById("d"+i).value
  };
  render();
}

function createTask(){
  const id=`EMS-20260210-${String(tasks.length+1).padStart(4,"0")}`;
  tasks.unshift({
    id,
    p:{
      name:name.value,sex:sex.value,age:age.value,
      cc:cc.value,hospital:hospital.value
    },
    r:{}
  });
  render();
}

render();
</script>
</body>
</html>
